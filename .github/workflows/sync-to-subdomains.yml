name: 🔄 Sync PitayaCore → All Subdomains (v11.1)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [api.batidospitaya, erp.batidospitaya, talento.batidospitaya]
    steps:
      - name: 🚀 1. Checkout
        uses: actions/checkout@v4

      - name: 🛡️ 2. Filtro Anti-Circular (v11.1 Env Secure)
        id: filter
        env:
          MSG: ${{ github.event.head_commit.message }}
          REPRO: ${{ matrix.repo }}
        run: |
          if [[ "$MSG" == *"$REPRO"* ]]; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "⏭️ OMITIENDO: Cambio detectado como origen propio."
          else
            echo "SKIP=false" >> $GITHUB_ENV
            echo "✅ ENVIANDO: Mensaje limpio de filtros de origen."
          fi

      - name: 🚀 3. Dispatch a ${{ matrix.repo }}
        if: env.SKIP == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: MiguelGotea/${{ matrix.repo }}
          event-type: pitayacore-sync
          client_payload: '{"sha": "${{ github.sha }}"}'
